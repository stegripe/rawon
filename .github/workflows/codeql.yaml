name: CodeQL

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: stegripe/workflows/.github/workflows/codeql-javascript-typescript.yaml@fcfd6bae08c7afa0a213fae4584a8667f0214688 # main
    with:
      runner: self-hosted
      node-version-file: .node-version
      build-mode: none
    secrets: inherit