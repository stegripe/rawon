name: CodeQL

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: stegripe/workflows/.github/workflows/codeql-javascript-typescript.yaml@main # main
    with:
      runner: self-hosted
      node-version-file: .node-version
      build-mode: none