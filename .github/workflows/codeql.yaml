name: CodeQL

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: stegripe/workflows/.github/workflows/codeql-javascript-typescript.yaml@356dbc21510fc935c351c19efa7a8545fe276c41 # main
    with:
      runner: self-hosted
      node-version-file: .node-version
      build-mode: none
    secrets: inherit